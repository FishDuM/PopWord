<!DOCTYPE html>
<html>
<head>
  <title>单词学习系统设置</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 400px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
    }
    .setting-item {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .setting-label {
      font-size: 14px;
      color: #333;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #2196F3;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(26px);
    }
    .save-button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .save-button:hover {
      background-color: #1976D2;
    }
    .status-message {
      margin-top: 15px;
      font-size: 14px;
      color: #4CAF50;
      display: none;
    }
  </style>
</head>
<body>
  <h1>单词学习系统设置</h1>
  
  <div class="setting-item">
    <span class="setting-label">单词和汉字同时出现</span>
    <label class="toggle-switch">
      <input type="checkbox" id="showBoth">
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <button class="save-button" id="saveButton">保存设置</button>
  <div class="status-message" id="statusMessage">设置已保存</div>
  
  <script src="options.js"></script>
</body>
</html>
